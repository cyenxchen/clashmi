name: Android Release

on:
  push:
    tags:
      - "v*"
  repository_dispatch:
    types:
      - mihomo-updated
      - upstream-clashmi-updated
      - vpn-service-updated
  workflow_dispatch:
    inputs:
      sync_upstream:
        description: "Merge KaringX/clashmi before building"
        required: false
        type: boolean
        default: false
      release_version:
        description: "Optional version name or tag, for example 1.0.23 or v1.0.23+804"
        required: false
        type: string
      build_number:
        description: "Optional Android versionCode override"
        required: false
        type: string
      prerelease:
        description: "Publish the GitHub release as prerelease"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-android-arm64:
    name: Build Android arm64-v8a APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    defaults:
      run:
        shell: bash
        working-directory: clashmi

    steps:
      - name: Checkout Clash Mi
        uses: actions/checkout@v4
        with:
          path: clashmi
          fetch-depth: 0
          token: ${{ secrets.CLASHMI_DISPATCH_TOKEN || github.token }}

      - name: Sync upstream Clash Mi
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.CLASHMI_DISPATCH_TOKEN || github.token }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_TYPE: ${{ github.event.action }}
          SYNC_UPSTREAM_INPUT: ${{ github.event.inputs.sync_upstream || false }}
        run: |
          set -euo pipefail

          should_sync=false
          if [[ "${EVENT_NAME}" == "schedule" ]]; then
            should_sync=true
          elif [[ "${EVENT_NAME}" == "repository_dispatch" && "${EVENT_TYPE}" == "upstream-clashmi-updated" ]]; then
            should_sync=true
          elif [[ "${EVENT_NAME}" == "workflow_dispatch" && "${SYNC_UPSTREAM_INPUT}" == "true" ]]; then
            should_sync=true
          fi

          echo "skip_release=false" >> "${GITHUB_OUTPUT}"
          echo "upstream_changed=false" >> "${GITHUB_OUTPUT}"

          if [[ "${should_sync}" != "true" ]]; then
            echo "Upstream sync skipped for event=${EVENT_NAME} type=${EVENT_TYPE}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/KaringX/clashmi.git
          git fetch upstream main

          before="$(git rev-parse HEAD)"
          if ! git merge --no-edit upstream/main; then
            git merge --abort || true
            upstream_sha="$(git rev-parse upstream/main)"
            origin_sha="${before}"
            run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            body=$(printf '%s\n' \
              '**Automatic upstream merge failed**' \
              '' \
              "The scheduled Clash Mi upstream sync could not merge \`KaringX/clashmi@main\` (\`${upstream_sha}\`) into \`${GITHUB_REPOSITORY}@${GITHUB_REF_NAME:-main}\` (\`${origin_sha}\`)." \
              '' \
              'Resolve locally:' \
              '```' \
              'git fetch https://github.com/KaringX/clashmi.git main' \
              'git merge FETCH_HEAD' \
              '# resolve conflicts, then push to your fork main' \
              '```' \
              '' \
              "Workflow run: ${run_url}")
            # Commit comment notifies repo watchers; works even when Issues are disabled.
            gh api "repos/${GITHUB_REPOSITORY}/commits/${origin_sha}/comments" \
              -f body="${body}" >/dev/null 2>&1 \
              || echo "::warning::Failed to post commit comment for merge-conflict notification"
            {
              echo "## :rotating_light: Upstream merge failed"
              echo ""
              echo "${body}"
            } >> "${GITHUB_STEP_SUMMARY}"
            echo "::error::Upstream merge failed; release stopped. See job summary and commit comment on ${origin_sha} for details."
            exit 1
          fi

          after="$(git rev-parse HEAD)"
          if [[ "${after}" == "${before}" ]]; then
            echo "No upstream changes found."
            if [[ "${EVENT_NAME}" == "schedule" ]]; then
              echo "skip_release=true" >> "${GITHUB_OUTPUT}"
            fi
            exit 0
          fi

          git push origin "HEAD:${GITHUB_REF_NAME:-main}"
          echo "upstream_changed=true" >> "${GITHUB_OUTPUT}"
          echo "Merged upstream Clash Mi ${before}..${after}"

      - name: Checkout open VPN bridge
        if: steps.upstream.outputs.skip_release != 'true'
        uses: actions/checkout@v4
        with:
          repository: cyenxchen/clashmi-vpn-service
          path: clashmi-vpn-service
          submodules: recursive

      - name: Set up Java
        if: steps.upstream.outputs.skip_release != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        if: steps.upstream.outputs.skip_release != 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: stable
          cache: true

      - name: Restore Android signing keystore
        if: steps.upstream.outputs.skip_release != 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [[ -z "${ANDROID_KEYSTORE_BASE64}" ]]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is required to build a signed release APK"
            exit 1
          fi

          mkdir -p private/clashmi/android/sign
          printf '%s' "${ANDROID_KEYSTORE_BASE64}" \
            | base64 --decode \
            > private/clashmi/android/sign/clashmi.release.keystore
          echo "Restored Android release keystore"

      - name: Install dependencies
        if: steps.upstream.outputs.skip_release != 'true'
        run: flutter pub get

      - name: Analyze
        if: steps.upstream.outputs.skip_release != 'true'
        run: flutter analyze

      - name: Determine release version
        if: steps.upstream.outputs.skip_release != 'true'
        id: version
        env:
          REQUESTED_VERSION: ${{ github.event.inputs.release_version || '' }}
          REQUESTED_BUILD_NUMBER: ${{ github.event.inputs.build_number || '' }}
          REQUESTED_PRERELEASE: ${{ github.event.inputs.prerelease || false }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_TYPE: ${{ github.event.action }}
        run: |
          set -euo pipefail

          pubspec_version="$(awk '/^version:/{print $2; exit}' pubspec.yaml)"
          pubspec_name="${pubspec_version%%+*}"
          if [[ "${pubspec_version}" == *+* ]]; then
            pubspec_build="${pubspec_version##*+}"
          else
            pubspec_build=0
          fi

          if [[ "${EVENT_NAME}" == "push" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag_name="${GITHUB_REF_NAME}"
            tag_version="${tag_name#v}"
            tag_version="${tag_version#V}"
            build_name="${tag_version%%+*}"
            if [[ "${tag_version}" == *+* ]]; then
              build_number="${tag_version##*+}"
            else
              build_number="${pubspec_build}"
            fi
          else
            requested="${REQUESTED_VERSION}"
            requested="${requested#v}"
            requested="${requested#V}"
            if [[ -n "${requested}" && "${requested}" == *+* ]]; then
              build_name="${requested%%+*}"
              requested_build_from_version="${requested##*+}"
            elif [[ -n "${requested}" ]]; then
              build_name="${requested}"
              requested_build_from_version=""
            else
              build_name="${pubspec_name}"
              requested_build_from_version=""
            fi

            latest_tag_build="$(git tag -l 'v*+*' \
              | sed -n 's/^v[0-9][0-9.]*+\([0-9][0-9]*\)$/\1/p' \
              | sort -n \
              | tail -1)"
            latest_tag_build="${latest_tag_build:-0}"
            max_build="${pubspec_build}"
            if (( latest_tag_build > max_build )); then
              max_build="${latest_tag_build}"
            fi

            if [[ -n "${REQUESTED_BUILD_NUMBER}" ]]; then
              build_number="${REQUESTED_BUILD_NUMBER}"
            elif [[ -n "${requested_build_from_version}" ]]; then
              build_number="${requested_build_from_version}"
            else
              build_number="$((max_build + 1))"
            fi
            tag_name="v${build_name}+${build_number}"
          fi

          if ! [[ "${build_name}" =~ ^[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "::error::Build name must be x.y.z, got ${build_name}"
            exit 1
          fi
          if ! [[ "${build_number}" =~ ^[0-9]+$ ]]; then
            echo "::error::Build number must be numeric, got ${build_number}"
            exit 1
          fi

          prerelease="${REQUESTED_PRERELEASE}"
          if ! [[ "${tag_name}" =~ ^[vV]?[0-9]+[.][0-9]+[.][0-9]+([+][0-9]+)?$ ]]; then
            prerelease=true
          fi

          target_sha="$(git rev-parse HEAD)"
          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"
          echo "build_name=${build_name}" >> "${GITHUB_OUTPUT}"
          echo "build_number=${build_number}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"
          echo "target_sha=${target_sha}" >> "${GITHUB_OUTPUT}"
          echo "Release ${tag_name}: build-name=${build_name}, build-number=${build_number}, target=${target_sha}, prerelease=${prerelease}"

      - name: Build release APK
        if: steps.upstream.outputs.skip_release != 'true'
        run: |
          flutter build apk \
            --release \
            --target-platform android-arm64 \
            --build-name "${{ steps.version.outputs.build_name }}" \
            --build-number "${{ steps.version.outputs.build_number }}" \
            --dart-define "APP_VERSION_NAME=${{ steps.version.outputs.build_name }}" \
            --dart-define "APP_VERSION_CODE=${{ steps.version.outputs.build_number }}"

      - name: Prepare release asset
        if: steps.upstream.outputs.skip_release != 'true'
        id: asset
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag_name }}"
          safe_tag="${tag//\//_}"
          asset_name="clashmi_${safe_tag}_android_arm64-v8a.apk"
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/${asset_name}"
          shasum -a 256 "dist/${asset_name}" | awk '{print $1}' > "dist/${asset_name}.sha256"
          echo "asset_path=clashmi/dist/${asset_name}" >> "${GITHUB_OUTPUT}"
          echo "asset_name=${asset_name}" >> "${GITHUB_OUTPUT}"
          echo "sha256_path=clashmi/dist/${asset_name}.sha256" >> "${GITHUB_OUTPUT}"
          echo "sha256_name=${asset_name}.sha256" >> "${GITHUB_OUTPUT}"
          echo "Prepared release asset ${asset_name}"

      - name: Publish GitHub Release
        if: steps.upstream.outputs.skip_release != 'true'
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
          TARGET_SHA: ${{ steps.version.outputs.target_sha }}
          PRERELEASE: ${{ steps.version.outputs.prerelease }}
          ASSET_PATH: ${{ steps.asset.outputs.asset_path }}
          ASSET_NAME: ${{ steps.asset.outputs.asset_name }}
          SHA256_PATH: ${{ steps.asset.outputs.sha256_path }}
          SHA256_NAME: ${{ steps.asset.outputs.sha256_name }}
        run: |
          set -euo pipefail

          notes="Automated Android arm64-v8a build.

          Trigger: ${GITHUB_EVENT_NAME}
          Source: ${GITHUB_REPOSITORY}@${TARGET_SHA}"

          if gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${TAG_NAME} exists; updating metadata"
            gh release edit "${TAG_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --notes "${notes}" \
              $([[ "${PRERELEASE}" == "true" ]] && echo "--prerelease" || echo "--latest")
          else
            echo "Creating release ${TAG_NAME}"
            release_args=(
              "${TAG_NAME}"
              --repo "${GITHUB_REPOSITORY}"
              --target "${TARGET_SHA}"
              --title "${TAG_NAME}"
              --notes "${notes}"
            )
            if [[ "${PRERELEASE}" == "true" ]]; then
              release_args+=(--prerelease)
            else
              release_args+=(--latest)
            fi
            gh release create "${release_args[@]}"
          fi

          asset_exists() {
            local asset_name="$1"
            gh release view "${TAG_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --json assets \
              --jq '.assets[].name' \
              | grep -Fxq "${asset_name}"
          }

          upload_asset() {
            local file_path="$1"
            local asset_name="$2"
            echo "Uploading ${asset_name}"
            if gh release upload "${TAG_NAME}" \
              "${file_path}" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber; then
              return 0
            fi
            if asset_exists "${asset_name}"; then
              echo "Upload reported a failure, but ${asset_name} exists on ${TAG_NAME}; continuing."
              return 0
            fi
            return 1
          }

          upload_asset "${ASSET_PATH}" "${ASSET_NAME}"
          upload_asset "${SHA256_PATH}" "${SHA256_NAME}"

      - name: Keep only the latest three releases
        if: steps.upstream.outputs.skip_release != 'true'
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
          KEEP_RELEASES: "3"
        run: |
          set -euo pipefail

          releases_json="$(gh release list \
            --repo "${GITHUB_REPOSITORY}" \
            --limit 1000 \
            --json tagName,createdAt \
            --jq 'sort_by(.createdAt, .tagName) | reverse')"

          release_count="$(jq 'length' <<< "${releases_json}")"
          echo "Found ${release_count} GitHub releases; keeping the latest ${KEEP_RELEASES}."
          if (( release_count <= KEEP_RELEASES )); then
            echo "No old releases to delete."
            exit 0
          fi

          echo "Keeping releases:"
          jq -r ".[0:${KEEP_RELEASES}][] | \"- \" + .tagName + \" (\" + .createdAt + \")\"" <<< "${releases_json}"

          mapfile -t old_tags < <(jq -r ".[${KEEP_RELEASES}:][].tagName" <<< "${releases_json}")
          for tag in "${old_tags[@]}"; do
            echo "Deleting old release and tag: ${tag}"
            gh release delete "${tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --cleanup-tag \
              --yes
          done

      - name: Skip scheduled release
        if: steps.upstream.outputs.skip_release == 'true'
        run: echo "No upstream changes found; scheduled release skipped."
