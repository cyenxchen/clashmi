name: Android Release

on:
  push:
    tags:
      - "**"

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-android-arm64:
    name: Build Android arm64-v8a APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    defaults:
      run:
        shell: bash
        working-directory: clashmi

    steps:
      - name: Checkout Clash Mi
        uses: actions/checkout@v4
        with:
          path: clashmi

      - name: Checkout open VPN bridge
        uses: actions/checkout@v4
        with:
          repository: cyenxchen/clashmi-vpn-service
          path: clashmi-vpn-service
          submodules: recursive

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: stable
          cache: true

      - name: Restore Android signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [[ -z "${ANDROID_KEYSTORE_BASE64}" ]]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is required to build a signed release APK"
            exit 1
          fi

          mkdir -p private/clashmi/android/sign
          printf '%s' "${ANDROID_KEYSTORE_BASE64}" \
            | base64 --decode \
            > private/clashmi/android/sign/clashmi.release.keystore
          echo "Restored Android release keystore for ${GITHUB_REF_NAME}"

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build release APK
        run: flutter build apk --release --target-platform android-arm64

      - name: Prepare release asset
        id: asset
        run: |
          tag="${GITHUB_REF_NAME}"
          safe_tag="${tag//\//_}"
          asset_name="clashmi_${safe_tag}_android_arm64-v8a.apk"
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/${asset_name}"
          echo "asset_path=clashmi/dist/${asset_name}" >> "${GITHUB_OUTPUT}"
          echo "asset_name=${asset_name}" >> "${GITHUB_OUTPUT}"
          echo "Prepared release asset ${asset_name}"

      - name: Publish GitHub Release
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          ASSET_PATH: ${{ steps.asset.outputs.asset_path }}
          ASSET_NAME: ${{ steps.asset.outputs.asset_name }}
        run: |
          if gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${TAG_NAME} exists; uploading ${ASSET_NAME} with clobber"
            gh release upload "${TAG_NAME}" \
              "${ASSET_PATH}#Android arm64-v8a APK" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            echo "Creating release ${TAG_NAME} with ${ASSET_NAME}"
            gh release create "${TAG_NAME}" \
              "${ASSET_PATH}#Android arm64-v8a APK" \
              --repo "${GITHUB_REPOSITORY}" \
              --verify-tag \
              --generate-notes
          fi
